<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolfe's Bento</title>
    <style>
        /* --- 1. 变量与重置 --- */
        :root {
            --bg-color: #f2f4f6;
            --card-bg: #ffffff;
            --text-main: #111111;
            --text-sub: #666666;
            --hover-shadow: 0 8px 30px rgba(0,0,0,0.12);
            --card-shadow: 0 2px 10px rgba(0,0,0,0.03);
            --radius: 28px;
            --transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 深色模式 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0d0d0d;
                --card-bg: #1c1c1e;
                --text-main: #ffffff;
                --text-sub: #a1a1a6;
                --hover-shadow: 0 8px 30px rgba(0,0,0,0.5);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* --- 2. 网格容器 --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4列布局 */
            grid-auto-rows: 180px; /* 每行高度 */
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* --- 3. 卡片基础 --- */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            position: relative;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.02);
        }
        
        .card:hover {
            transform: scale(1.02);
            box-shadow: var(--hover-shadow);
            z-index: 10;
        }

        /* 布局辅助类 */
        .col-span-2 { grid-column: span 2; }
        .row-span-2 { grid-row: span 2; }

        /* 通用标题样式 */
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-desc {
            font-size: 0.9rem;
            color: var(--text-sub);
            line-height: 1.4;
        }
        .card-icon {
            width: 24px;
            height: 24px;
        }

        /* --- 4. 具体卡片定制 --- */

        /* Profile: 个人简介 */
        .profile-card {
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            justify-content: flex-end;
        }
        .profile-content { z-index: 2; }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #fff;
            margin-bottom: 16px;
            padding: 4px;
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-card h1 { font-size: 2rem; color: #333; margin-bottom: 4px; }
        .profile-card p { color: #555; font-weight: 500; }

        /* Blog: 博客 */
        .blog-card {
            background-color: var(--card-bg);
            border: 2px solid rgba(0,0,0,0.05);
            justify-content: center;
        }
        .blog-card:hover { border-color: #007aff; }
        .blog-card .arrow-icon {
            position: absolute;
            top: 24px;
            right: 24px;
            opacity: 0.3;
        }

        /* Social Cards: 品牌色 */
        .github-card { background: #24292e; color: #fff; justify-content: space-between; }
        .github-card .card-desc { color: #aaa; }
        
        .x-card { background: #000; color: #fff; align-items: center; justify-content: center; }
        .x-card svg { fill: #fff; width: 48px; height: 48px; }
        
        .tg-card { background: #229ED9; color: #fff; align-items: center; justify-content: center; }
        .tg-card svg { fill: #fff; width: 48px; height: 48px; }

        /* Email Card */
        .email-card {
            background: var(--text-main);
            color: var(--bg-color);
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-align: center;
        }
        .email-card h3 { font-size: 1.2rem; margin-top: 10px; word-break: break-all; }
        .email-card .status { 
            font-size: 0.8rem; 
            opacity: 0.7; 
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Storage Card */
        .storage-card {
            background: #fff;
            justify-content: space-between;
        }
        [data-theme="dark"] .storage-card { background: #2c2c2e; }

        /* --- 5. 提示弹窗 --- */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* --- 6. 移动端适配 --- */
        @media (max-width: 768px) {
            .bento-grid {
                grid-template-columns: 1fr; /* 单列 */
                grid-auto-rows: auto; /* 高度自适应 */
            }
            .col-span-2, .row-span-2 { grid-column: auto; grid-row: auto; }
            .card { min-height: 160px; }
            .profile-card { min-height: 300px; }
        }
    </style>
</head>
<body>

    <div class="bento-grid">
        
        <!-- 1. 个人简介 (2列 x 2行) -->
        <div class="card col-span-2 row-span-2 profile-card">

    <!-- 复制成功提示 -->
    <div class="toast" id="toast">邮箱已复制到剪贴板</div>

    <script>
        const emailBtn = document.getElementById('emailBtn');
        const toast = document.getElementById('toast');
        const emailAddress = "fishp2024@gmail.com";

        emailBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(emailAddress).then(() => {
                showToast();
            }).catch(err => {
                console.error('Copy failed', err);
                alert('复制失败，请手动复制: ' + emailAddress);
            });
        });

        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
